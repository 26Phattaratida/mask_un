<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- นำเข้าฟอนต์ Google Font เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h2 {
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 1.5rem;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* ปุ่มกดสไตล์โมเดิร์น */
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        /* จัดการกรอบ Webcam ให้ดูโปร */
        #webcam-container {
            margin: 25px auto;
            border-radius: 15px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* กล่องแสดงผลลัพธ์การทำนาย */
        #label-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .prediction-item {
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #667eea;
            font-weight: 500;
            color: #4a5568;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .probability-badge {
            background: #e2e8f0;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #4a5568;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Teachable Machine</h2>
    <p class="subtitle">ระบบวิเคราะห์รูปภาพผ่าน AI (อัปเดตทุก 3 วินาที)</p>
    
    <button type="button" class="btn-start" onclick="init()">เริ่มเปิดกล้อง</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
    </div>
    
    <div id="label-container">
        <!-- ผลลัพธ์จะแสดงตรงนี้ -->
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/sDX-ni7mk/";

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; // ตัวแปรเก็บเวลาล่าสุดที่ทำนายผล

    async function init() {
        // ซ่อนปุ่มเริ่มหลังจากกด เพื่อป้องกันการกดซ้ำ
        document.querySelector('.btn-start').style.display = 'none';

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่าเว็บแคม (ปรับขนาดการแสดงผลให้เข้ากับดีไซน์ใหม่เป็น 250x250)
        const flip = true; 
        webcam = new tmImage.Webcam(250, 250, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        
        // สร้างโครงสร้างกล่องข้อความรอไว้ล่วงหน้าเพื่อความสวยงาม
        for (let i = 0; i < maxPredictions; i++) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "prediction-item";
            itemDiv.innerHTML = `<span>กำลังโหลด...</span><span class="probability-badge">0.00</span>`;
            labelContainer.appendChild(itemDiv);
        }
    }

    async function loop(timestamp) {
        webcam.update(); // อัปเดตเฟรมของกล้องให้ลื่นไหลตลอดเวลา
        
        // ตรวจสอบว่าเวลาผ่านไปครบ 3,000 มิลลิวินาที (3 วินาที) หรือยัง
        if (timestamp - lastPredictTime >= 3000) {
            await predict();
            lastPredictTime = timestamp; // บันทึกเวลาที่ทำนายล่าสุด
        }
        
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability.toFixed(2);
            
            // อัปเดตข้อมูลเข้าไปในคลาส UI ที่เราดีไซน์ไว้
            labelContainer.childNodes[i].innerHTML = `
                <span>${className}</span>
                <span class="probability-badge">${probability}</span>
            `;
        }
    }
</script>

</body>
</html>
