<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        /* สไตล์โมเดิร์นและจัดแต่งหน้าตา */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 30px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* ปุ่มกดสไตล์มินิมอล */
        .btn-start {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        /* กล่องครอบกล่องเว็บบแคม */
        #webcam-container {
            margin: 20px auto;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e0e0e0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* จัดแต่งการแสดงผลผลลัพธ์ */
        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }

        .label-name {
            font-weight: 600;
            color: #495057;
        }

        .label-prob {
            font-family: monospace;
            font-size: 15px;
            color: #2b8a3e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" onclick="init()">เปิดกล้องเริ่มต้นการทำงาน</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
    </div>
    
    <div id="label-container">
        <!-- ผลลัพธ์การทำนายจะแสดงตรงนี้ -->
    </div>
</div>

<!-- สคริปต์จาก TensorFlow และ Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/sDX-ni7mk/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval;

    async function init() {
        // เปลี่ยนข้อความบนปุ่มเพื่อแจ้งสถานะกำลังโหลด
        document.querySelector('.btn-start').innerText = "กำลังโหลดโมเดล...";
        document.querySelector('.btn-start').disabled = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้องเว็บแคม
        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        // เคลียร์ข้อความในกรณีที่กดซ้ำ และแสดงหน้าจอเว็บแคม
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // เคลียร์ของเก่า
        
        for (let i = 0; i < maxPredictions; i++) { 
            let row = document.createElement("div");
            row.className = "prediction-row";
            row.innerHTML = `<span class="label-name">-</span><span class="label-prob">0.00%</span>`;
            labelContainer.appendChild(row);
        }

        // ซ่อนปุ่มหลังจากเริ่มทำงานสำเร็จ
        document.querySelector('.btn-start').style.display = "none";

        // ลูปอัปเดตภาพจากกล้องเพื่อให้วิดีโอเคลื่อนไหวลื่นไหลตามปกติ
        window.requestAnimationFrame(loop);

        // สั่งให้ฟังก์ชันทำนายผล (Predict) ทำงานทุกๆ 3 วินาที (3000 มิลลิวินาที)
        predictInterval = setInterval(predict, 3000);
    }

    async function loop() {
        webcam.update(); // อัปเดตเฟรมภาพจากกล้องอย่างต่อเนื่อง
        window.requestAnimationFrame(loop);
    }

    // ฟังก์ชันทำนายผลที่จะถูกเรียกทุกๆ 3 วินาที
    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            // แปลงค่าความน่าจะเป็นให้อยู่ในรูปแบบเปอร์เซ็นต์ที่อ่านง่าย (เช่น 95.50%)
            const probability = (prediction[i].probability * 100).toFixed(2) + "%";
            
            // อัปเดตข้อมูลลงบน UI
            const row = labelContainer.childNodes[i];
            row.querySelector('.label-name').innerText = className;
            row.querySelector('.label-prob').innerText = probability;
        }
    }
</script>

</body>
</html>
