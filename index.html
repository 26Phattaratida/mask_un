<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <style>
        /* ปรับแต่งสไตล์ให้ดูโมเดิร์นและสะอาดตา */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* ปุ่มกดสไตล์มินิมอล */
        .btn-start {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
            margin-bottom: 25px;
        }

        .btn-start:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        /* กล่องครอบเว็บแคม */
        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* ส่วนแสดงผลลัพธ์การทำนาย */
        #label-container {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 15px;
            border-bottom: 1px solid #edf2f7;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .class-name {
            font-weight: 600;
            color: #4a5568;
        }

        .probability {
            font-family: monospace;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            color: #2d3748;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" onclick="init()">เปิดกล้องทำงาน</button>
    <div id="webcam-container"><span>ยังไม่ได้เปิดกล้อง</span></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/sDX-ni7mk/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval; // ตัวแปรสำหรับเก็บรอบการทำงาน 3 วินาที

    async function init() {
        // เปลี่ยนข้อความในปุ่มและปิดการกดซ้ำระหว่างโหลด
        const btn = document.querySelector('.btn-start');
        btn.disabled = true;
        btn.innerText = "กำลังโหลดโมเดล...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่าเว็บแคม (ปรับขนาดเป็น 250x250 ให้เข้ากับดีไซน์ใหม่)
        const flip = true; 
        webcam = new tmImage.Webcam(250, 250, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        // ล้างข้อความเริ่มต้นออกแล้วใส่กล้องเข้าไปแทน
        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = "";
        webcamContainer.appendChild(webcam.canvas);

        // สร้างพื้นที่แสดงผลแบบจัดรูปแบบสวยงาม
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // ล้างข้อมูลเก่า
        for (let i = 0; i < maxPredictions; i++) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "prediction-item";
            
            const nameSpan = document.createElement("span");
            nameSpan.className = "class-name";
            
            const probSpan = document.createElement("span");
            probSpan.className = "probability";
            
            itemDiv.appendChild(nameSpan);
            itemDiv.appendChild(probSpan);
            labelContainer.appendChild(itemDiv);
        }

        // เปลี่ยนสถานะปุ่มเมื่อพร้อมใช้งาน
        btn.innerText = "กำลังทำงาน...";

        // เคลียร์ Interval เก่าหากมี และตั้งลูปให้กล้องอัปเดตและทำนายทุกๆ 3000 มิลลิวินาที (3 วินาที)
        if(predictInterval) clearInterval(predictInterval);
        
        // รันครั้งแรกทันทีโดยไม่ต้องรอ 3 วินาทีแรก
        updateAndPredict(); 

        predictInterval = setInterval(async () => {
            await updateAndPredict();
        }, 3000);
    }

    // ฟังก์ชันหลักในการอัปเดตภาพเว็บแคมและประมวลผลผลลัพธ์
    async function updateAndPredict() {
        if (webcam) {
            webcam.update(); // อัปเดตเฟรมภาพปัจจุบันจากกล้อง
            await predict(); // ส่งภาพไปทายผล
        }
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        const items = labelContainer.getElementsByClassName("prediction-item");
        
        for (let i = 0; i < maxPredictions; i++) {
            const nameSpan = items[i].getElementsByClassName("class-name")[0];
            const probSpan = items[i].getElementsByClassName("probability")[0];
            
            // แปลงความน่าจะเป็นเป็นเปอร์เซ็นต์เพื่อให้ผู้ใช้ดูง่ายขึ้น (เช่น 95%) หรือใช้ .toFixed(2) แบบเดิมได้ครับ
            const percent = (prediction[i].probability * 100).toFixed(0) + "%";
            
            nameSpan.innerText = prediction[i].className;
            probSpan.innerText = percent;
        }
    }
</script>

</body>
</html>
